name: Sync backend to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push backend/ subtree to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git branch -D hf-space-sync 2>/dev/null || true
          git subtree split --prefix=backend -b hf-space-sync
          git push "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}" hf-space-sync:main --force
